<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>100 Miracle – 3D Book</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08080f;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
  }
  #canvas3d { display: block; cursor: grab; touch-action: none; }
  #canvas3d:active { cursor: grabbing; }
  #hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.28);
    font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
    pointer-events: none;
  }
  #loading {
    position: fixed; inset: 0;
    background: #08080f;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.35);
    font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
    transition: opacity 0.7s; z-index: 10;
  }
</style>
</head>
<body>
<div id="loading">Building book…</div>
<canvas id="canvas3d"></canvas>
<div id="hint">Drag to rotate &nbsp;·&nbsp; Scroll to zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {

  /* ══════════════════════════════════════════
     BOOK DIMENSIONS  (approx real proportions)
     ══════════════════════════════════════════ */
  const BW = 1.0;   // width
  const BH = 1.30;  // height
  const BD = 0.13;  // thickness

  /* ══════════════════════════════════════════
     CANVAS TEXTURE FACTORIES
     ══════════════════════════════════════════ */

  /* Holographic multi-stop gradient */
  function holoGrad(ctx, x1, y1, x2, y2, t) {
    const g = ctx.createLinearGradient(x1, y1, x2, y2);
    const h = (t * 55) % 360;
    const stops = [0, 0.18, 0.35, 0.52, 0.7, 0.85, 1];
    const hues  = [0, 48, 125, 190, 252, 305, 360];
    stops.forEach((s, i) => {
      g.addColorStop(s, `hsl(${(h + hues[i]) % 360},100%,66%)`);
    });
    return g;
  }

  /* ── FRONT COVER ── */
  const FC_W = 1024, FC_H = 1340;
  const frontCanvas = document.createElement('canvas');
  frontCanvas.width = FC_W; frontCanvas.height = FC_H;

  function drawFront(t) {
    const ctx = frontCanvas.getContext('2d');

    /* Background */
    ctx.fillStyle = '#0d0d11';
    ctx.fillRect(0, 0, FC_W, FC_H);

    /* Subtle texture noise */
    const id = ctx.getImageData(0, 0, FC_W, FC_H);
    for (let i = 0; i < id.data.length; i += 4) {
      const n = (Math.random() - 0.5) * 12;
      id.data[i]   = Math.max(0, Math.min(255, id.data[i]   + n));
      id.data[i+1] = Math.max(0, Math.min(255, id.data[i+1] + n));
      id.data[i+2] = Math.max(0, Math.min(255, id.data[i+2] + n));
    }
    ctx.putImageData(id, 0, 0);

    /* Outer gold border frame */
    ctx.strokeStyle = 'rgba(210,178,75,0.55)';
    ctx.lineWidth = 3.5;
    ctx.strokeRect(50, 50, FC_W - 100, FC_H - 100);
    ctx.strokeStyle = 'rgba(210,178,75,0.18)';
    ctx.lineWidth = 1;
    ctx.strokeRect(60, 60, FC_W - 120, FC_H - 120);

    /* ── "100" holographic ── */
    ctx.save();
    ctx.font = '900 430px Arial Black, Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    /* Drop shadow */
    ctx.shadowColor = 'rgba(0,0,0,0.9)';
    ctx.shadowBlur = 40; ctx.shadowOffsetX = 8; ctx.shadowOffsetY = 10;
    ctx.fillStyle = '#1a1a22';
    ctx.fillText('100', FC_W / 2, 485);
    ctx.shadowColor = 'transparent';

    /* Main holographic fill */
    ctx.fillStyle = holoGrad(ctx, 60, 240, FC_W - 60, 720, t);
    ctx.fillText('100', FC_W / 2, 475);

    /* White sheen sweep */
    const sweep = (Math.sin(t * 1.4) + 1) / 2; // 0-1
    const sheenX = 60 + sweep * (FC_W - 120);
    const sg = ctx.createLinearGradient(sheenX - 120, 0, sheenX + 120, 0);
    sg.addColorStop(0,   'rgba(255,255,255,0)');
    sg.addColorStop(0.5, 'rgba(255,255,255,0.22)');
    sg.addColorStop(1,   'rgba(255,255,255,0)');
    ctx.fillStyle = sg;
    ctx.fillText('100', FC_W / 2, 475);
    ctx.restore();

    /* ── "MIRACLE" ── */
    ctx.save();
    ctx.font = 'bold 64px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = holoGrad(ctx, 180, 740, FC_W - 180, 810, t + 1.6);
    ctx.fillText('MIRACLE', FC_W / 2, 775);
    ctx.restore();

    /* Thin rule */
    ctx.save();
    ctx.strokeStyle = `hsl(${(t * 50 + 185) % 360}, 80%, 62%)`;
    ctx.lineWidth = 1.5; ctx.globalAlpha = 0.55;
    ctx.beginPath();
    ctx.moveTo(190, 818); ctx.lineTo(FC_W - 190, 818);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();

    /* ── "KIM MI HYO" gold ── */
    ctx.save();
    ctx.font = 'bold 70px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const gold = ctx.createLinearGradient(140, 0, FC_W - 140, 0);
    gold.addColorStop(0,   '#7a5e22');
    gold.addColorStop(0.25,'#c8a040');
    gold.addColorStop(0.5, '#f0d070');
    gold.addColorStop(0.75,'#c8a040');
    gold.addColorStop(1,   '#7a5e22');
    ctx.fillStyle = gold;
    ctx.shadowColor = 'rgba(220,170,40,0.45)'; ctx.shadowBlur = 22;
    ctx.fillText('KIM MI HYO', FC_W / 2, 1200);
    ctx.restore();
  }

  /* ── BACK COVER ── */
  function makeBack() {
    const c = document.createElement('canvas');
    c.width = FC_W; c.height = FC_H;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#0b0b0f';
    ctx.fillRect(0, 0, FC_W, FC_H);
    /* Faint corner mark */
    ctx.strokeStyle = 'rgba(200,170,70,0.2)';
    ctx.lineWidth = 2;
    ctx.strokeRect(50, 50, FC_W - 100, FC_H - 100);
    return c;
  }

  /* ── SPINE ── */
  function makeSpine() {
    const c = document.createElement('canvas');
    c.width = 180; c.height = FC_H;
    const ctx = c.getContext('2d');
    /* Gradient spine — slightly lighter than cover */
    const g = ctx.createLinearGradient(0, 0, 180, 0);
    g.addColorStop(0,   '#08080c');
    g.addColorStop(0.3, '#16161e');
    g.addColorStop(0.7, '#16161e');
    g.addColorStop(1,   '#08080c');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, 180, FC_H);
    /* Edge lines */
    ctx.strokeStyle = 'rgba(180,148,55,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(2, 0); ctx.lineTo(2, FC_H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(178, 0); ctx.lineTo(178, FC_H); ctx.stroke();
    /* Rotated text */
    ctx.save();
    ctx.translate(90, FC_H / 2);
    ctx.rotate(-Math.PI / 2);
    ctx.font = 'bold 40px Arial';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(190,158,62,0.75)';
    ctx.fillText('KIM MI HYO  ·  100 MIRACLE', 0, 0);
    ctx.restore();
    return c;
  }

  /* ── PAGES (right edge) ── */
  function makePages() {
    const c = document.createElement('canvas');
    c.width = 180; c.height = FC_H;
    const ctx = c.getContext('2d');
    for (let y = 0; y < FC_H; y++) {
      const v = 195 + Math.sin(y * 0.55) * 14 + (Math.random() - 0.5) * 7;
      ctx.fillStyle = `rgb(${v | 0},${(v - 8) | 0},${(v - 18) | 0})`;
      ctx.fillRect(0, y, 180, 1);
    }
    /* Left shadow on pages */
    const sh = ctx.createLinearGradient(0, 0, 40, 0);
    sh.addColorStop(0, 'rgba(0,0,0,0.45)');
    sh.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sh;
    ctx.fillRect(0, 0, 40, FC_H);
    return c;
  }

  /* ── TOP / BOTTOM EDGE ── */
  function makeEdge(horiz) {
    const c = document.createElement('canvas');
    const [ew, eh] = horiz ? [FC_W, 180] : [FC_W, 180];
    c.width = ew; c.height = eh;
    const ctx = c.getContext('2d');
    for (let x = 0; x < ew; x++) {
      const v = 190 + Math.sin(x * 0.45) * 12 + (Math.random() - 0.5) * 7;
      ctx.fillStyle = `rgb(${v | 0},${(v - 7) | 0},${(v - 16) | 0})`;
      ctx.fillRect(x, 0, 1, eh);
    }
    return c;
  }

  /* ══════════════════════════════════════════
     THREE.JS SETUP
     ══════════════════════════════════════════ */
  const canvas = document.getElementById('canvas3d');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.15;

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, 1, 0.01, 100);
  camera.position.set(0, 0.12, 3.0);

  function resize() {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  /* ── LIGHTS ── */
  scene.add(new THREE.AmbientLight(0xfff0e0, 0.4));

  const key = new THREE.DirectionalLight(0xfff8f0, 2.0);
  key.position.set(3, 5, 5);
  key.castShadow = true;
  key.shadow.mapSize.set(1024, 1024);
  scene.add(key);

  const fill = new THREE.DirectionalLight(0xd0e8ff, 0.7);
  fill.position.set(-4, 2, 3);
  scene.add(fill);

  const rim = new THREE.DirectionalLight(0xffe8cc, 0.4);
  rim.position.set(0, -4, -3);
  scene.add(rim);

  const ptA = new THREE.PointLight(0x7050ff, 1.0, 10);
  ptA.position.set(-2, 1, 2.5);
  scene.add(ptA);
  const ptB = new THREE.PointLight(0x30eebb, 0.6, 10);
  ptB.position.set(2, -1, 2.5);
  scene.add(ptB);

  /* ── TEXTURES ── */
  function tex(c, rough, metal) {
    const t = new THREE.CanvasTexture(c);
    t.encoding = THREE.sRGBEncoding;
    return new THREE.MeshStandardMaterial({
      map: t, roughness: rough, metalness: metal, side: THREE.FrontSide
    });
  }

  /* Draw initial front */
  drawFront(0);
  const frontMat = tex(frontCanvas, 0.40, 0.08);
  const backMat  = tex(makeBack(),  0.70, 0.0);
  const spineMat = tex(makeSpine(), 0.65, 0.0);
  const pagesMat = tex(makePages(), 0.88, 0.0);
  const topMat   = tex(makeEdge(true), 0.85, 0.0);
  const botMat   = tex(makeEdge(true), 0.85, 0.0);

  /* ── BOOK GROUP ── */
  const book = new THREE.Group();
  scene.add(book);

  function addPlane(w, h, mat, px, py, pz, rx, ry) {
    const m = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
    m.position.set(px, py, pz);
    m.rotation.set(rx, ry, 0);
    m.castShadow = true; m.receiveShadow = true;
    book.add(m);
    return m;
  }

  /* Front  */ addPlane(BW, BH, frontMat, 0, 0,      BD/2,        0,           0);
  /* Back   */ addPlane(BW, BH, backMat,  0, 0,     -BD/2,        0,           Math.PI);
  /* Spine  */ addPlane(BD, BH, spineMat,-BW/2, 0,   0,           0,          -Math.PI/2);
  /* Pages  */ addPlane(BD, BH, pagesMat, BW/2, 0,   0,           0,           Math.PI/2);
  /* Top    */ addPlane(BW, BD, topMat,   0,  BH/2,  0,          -Math.PI/2,   0);
  /* Bottom */ addPlane(BW, BD, botMat,   0, -BH/2,  0,           Math.PI/2,   0);

  /* Ground shadow catcher */
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(12, 12),
    new THREE.ShadowMaterial({ opacity: 0.4 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -BH / 2 - 0.005;
  ground.receiveShadow = true;
  scene.add(ground);

  /* ══════════════════════════════════════════
     INTERACTION
     ══════════════════════════════════════════ */
  let rotX = -0.15, rotY = -0.48;
  let dragging = false, lx = 0, ly = 0;
  let userInteracted = false;

  function applyRot() {
    book.rotation.x = rotX;
    book.rotation.y = rotY;
  }

  canvas.addEventListener('mousedown', e => {
    dragging = true; lx = e.clientX; ly = e.clientY; userInteracted = true;
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    rotY += (e.clientX - lx) * 0.007;
    rotX += (e.clientY - ly) * 0.007;
    rotX = Math.max(-1.25, Math.min(1.25, rotX));
    lx = e.clientX; ly = e.clientY;
    applyRot();
  });
  window.addEventListener('mouseup', () => dragging = false);

  canvas.addEventListener('touchstart', e => {
    dragging = true;
    lx = e.touches[0].clientX; ly = e.touches[0].clientY;
    userInteracted = true; e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    if (!dragging) return;
    rotY += (e.touches[0].clientX - lx) * 0.007;
    rotX += (e.touches[0].clientY - ly) * 0.007;
    rotX = Math.max(-1.25, Math.min(1.25, rotX));
    lx = e.touches[0].clientX; ly = e.touches[0].clientY;
    applyRot(); e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchend', () => dragging = false);

  canvas.addEventListener('wheel', e => {
    camera.position.z = Math.max(1.1, Math.min(5.5, camera.position.z + e.deltaY * 0.004));
    e.preventDefault();
  }, { passive: false });

  /* ══════════════════════════════════════════
     RENDER LOOP
     ══════════════════════════════════════════ */
  const clock = new THREE.Clock();
  let elapsed = 0;
  let holoFrame = 0;

  applyRot();

  function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    elapsed += dt;

    /* Auto spin until user grabs */
    if (!userInteracted) {
      rotY += dt * 0.5;
      applyRot();
    }

    /* Animate holo every 3rd frame for perf */
    holoFrame++;
    if (holoFrame % 3 === 0) {
      drawFront(elapsed);
      frontMat.map.needsUpdate = true;
    }

    /* Orbit point lights */
    ptA.position.x = Math.sin(elapsed * 0.65) * 3;
    ptA.position.z = Math.cos(elapsed * 0.65) * 3;
    ptB.position.x = Math.cos(elapsed * 0.45) * 3;
    ptB.position.z = Math.sin(elapsed * 0.45) * 3;

    renderer.render(scene, camera);
  }

  /* Hide loader */
  const loader = document.getElementById('loading');
  loader.style.opacity = '0';
  setTimeout(() => loader.remove(), 800);

  animate();
})();
</script>
</body>
</html>
